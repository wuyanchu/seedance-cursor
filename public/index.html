<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seedance 2.0 Video Generator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Seedance 2.0 Video Generator</h1>
        <p>Generate a video from text, then download it.</p>
      </header>

      <section class="card">
        <form id="video-form">
          <label for="prompt">Prompt</label>
          <textarea
            id="prompt"
            name="prompt"
            rows="6"
            maxlength="2000"
            placeholder="Example: A cinematic drone shot flying over snowy mountains at sunrise."
            required
          ></textarea>

          <div class="grid">
            <label>
              Duration (seconds)
              <select name="duration">
                <option value="4">4</option>
                <option value="5" selected>5</option>
                <option value="8">8</option>
                <option value="10">10</option>
                <option value="12">12</option>
                <option value="15">15</option>
              </select>
            </label>

            <label>
              Resolution
              <select name="resolution">
                <option value="480p">480p</option>
                <option value="720p" selected>720p</option>
                <option value="1080p">1080p</option>
              </select>
            </label>

            <label>
              Aspect ratio
              <select name="aspectRatio">
                <option value="16:9" selected>16:9</option>
                <option value="9:16">9:16</option>
                <option value="1:1">1:1</option>
                <option value="4:3">4:3</option>
                <option value="3:4">3:4</option>
                <option value="21:9">21:9</option>
              </select>
            </label>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" name="generateAudio" checked />
            Generate audio
          </label>

          <button id="generate-button" type="submit">Generate video</button>
        </form>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="status-text">Waiting for prompt...</p>
        <p id="task-id"></p>
      </section>

      <section class="card hidden" id="result-card">
        <h2>Result</h2>
        <video id="result-video" controls playsinline></video>
        <div class="actions">
          <a id="download-link" class="button-link" href="#">Download video</a>
          <a id="open-link" class="button-link secondary" href="#" target="_blank" rel="noreferrer"
            >Open source URL</a
          >
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
